services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 10

  target-app:
    build: ./target_app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - LOG_PATH=/app/logs/app.log
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - log-data:/app/logs

  sentinel-agent:
    build: ./agent
    depends_on:
      - target-app
    environment:
      - LOG_PATH=/app/logs/app.log
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TARGET_APP_SRC=/app/target_app_src
    volumes:
      - log-data:/app/logs:ro
      # Read-only access to the app's source for the retrieval agent.
      # Toy-scale simplification -- see SECOND_ITERATION_ARCHITECTURE.md
      # for why this doesn't scale and the planned git-based follow-up.
      - ./target_app:/app/target_app_src:ro

volumes:
  log-data:
  postgres-data:
