services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 10

  fake-email-service:
    build: ./fake_email_service
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 2s
      timeout: 3s
      retries: 10

  fake-payment-service:
    build: ./fake_payment_service
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 2s
      timeout: 3s
      retries: 10

  target-app:
    build: ./target_app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      fake-email-service:
        condition: service_healthy
      fake-payment-service:
        condition: service_healthy
    environment:
      - LOG_PATH=/app/logs/app.log
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - EMAIL_SERVICE_URL=http://fake-email-service:8001
      - PAYMENT_SERVICE_URL=http://fake-payment-service:8002
    volumes:
      - log-data:/app/logs

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  chromadb:
    image: chromadb/chroma:0.5.23
    volumes:
      - chroma-data:/chroma/chroma
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v2/heartbeat')"]
      interval: 2s
      timeout: 3s
      retries: 10

  sentinel-agent:
    build: ./agent
    depends_on:
      target-app:
        condition: service_started
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    environment:
      - LOG_PATH=/app/logs/app.log
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TARGET_APP_SRC=/app/target_app_src
      - REDIS_URL=redis://redis:6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    volumes:
      - log-data:/app/logs:ro
      # Read-only access to the app's source for the retrieval agent.
      # Toy-scale simplification -- see SECOND_ITERATION_ARCHITECTURE.md
      # for why this doesn't scale and the planned git-based follow-up.
      - ./target_app:/app/target_app_src:ro

  traffic-simulator:
    build: ./traffic_simulator
    profiles: ["stress"]  # never starts with plain `docker compose up`
    depends_on:
      - target-app
    environment:
      - TARGET_BASE_URL=http://target-app:8000
      - WORKERS=50
      - DURATION_SECONDS=30

volumes:
  log-data:
  postgres-data:
  chroma-data:
